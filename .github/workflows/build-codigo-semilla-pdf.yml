name: Build Codigo Semilla PDF

on:
  push:
    branches:
      - main
    paths:
      - "CODIGO_SEMILLA_*.es.md"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PDF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-latex-recommended texlive-latex-extra texlive-lang-spanish fonts-noto

      - name: Verify PDF logo exists
        run: |
          if [ ! -f "IEHI_logo_transparente_recortado.png" ]; then
            echo "Required PDF logo not found: IEHI_logo_transparente_recortado.png"
            exit 1
          fi

      - name: Detect latest Codigo Semilla version
        id: version
        shell: python
        run: |
          import os
          import re
          from pathlib import Path

          pattern = re.compile(r"^CODIGO_SEMILLA_(v\d+(?:\.\d+)*)(?:-RC(\d+))?\.es\.md$")
          candidates = []

          for path in Path(".").glob("CODIGO_SEMILLA_*.es.md"):
            match = pattern.match(path.name)
            if not match:
              continue

            version = match.group(1)
            rc = match.group(2)
            parts = tuple(int(part) for part in version[1:].split("."))
            rc_rank = int(rc) if rc is not None else 10**9
            current_version = f"{version}-RC{rc}" if rc is not None else version
            pdf_version = current_version.replace(".", "_").replace("-", "_")
            candidates.append((parts, rc_rank, path.name, current_version, f"Codigo_Semilla_{pdf_version}_IEHI.pdf"))

          if not candidates:
            raise SystemExit("No CODIGO_SEMILLA_*.es.md files found.")

          _, _, markdown_file, current_version, pdf_file = sorted(candidates)[-1]
          markdown_text = Path(markdown_file).read_text(encoding="utf-8")

          def read_field(label, default):
            field = re.search(rf"^\*\*{re.escape(label)}:\*\*\s*(.+?)\s*$", markdown_text, re.MULTILINE)
            return field.group(1).strip() if field else default

          estado = read_field("Estado", "candidato inicial para revisión pública global")
          horizonte = read_field("Horizonte institucional", "5,000 años")
          idioma = read_field("Idioma canónico inicial", "español")
          naturaleza = read_field("Naturaleza", "código abierto civilizatorio custodiado")
          fecha = read_field("Fecha de emisión", "")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
            output.write(f"markdown_file={markdown_file}\n")
            output.write(f"current_version={current_version}\n")
            output.write(f"pdf_file={pdf_file}\n")
            output.write(f"estado={estado}\n")
            output.write(f"horizonte={horizonte}\n")
            output.write(f"idioma={idioma}\n")
            output.write(f"naturaleza={naturaleza}\n")
            output.write(f"fecha={fecha}\n")

      - name: Prepare PDF body without duplicated cover metadata
        shell: python
        run: |
          import re
          from pathlib import Path

          markdown_file = Path("${{ steps.version.outputs.markdown_file }}")
          markdown_text = markdown_file.read_text(encoding="utf-8")
          section = re.search(r"^(?:#{1,6}\s*)?0\.\s+Estado del documento\s*$", markdown_text, re.MULTILINE)

          if not section:
            raise SystemExit("Could not find section: 0. Estado del documento")

          body_text = markdown_text[section.start():]
          body_text = body_text.replace("\ufeff", "")
          body_text = re.sub(r"[\u200b\u200c\u200d\u2060]", "", body_text)
          body_text = body_text.replace("\u00ad", "")
          body_text = body_text.replace("\u00a0", " ")
          body_text = re.sub(r"(?m)^(\s*)[•‣⁃◦]\s+", r"\1- ", body_text)

          build_dir = Path(".build")
          build_dir.mkdir(exist_ok=True)
          Path(".build/codigo-semilla-body.md").write_text(body_text, encoding="utf-8")

      - name: Generate PDF
        run: |
          pandoc ".build/codigo-semilla-body.md" \
            --from markdown \
            --pdf-engine=xelatex \
            --template=".github/pdf/iehi-template.tex" \
            --metadata title="Código Semilla ${{ steps.version.outputs.current_version }}" \
            -V mainfont="Noto Serif" \
            -V sansfont="Noto Sans" \
            -V monofont="Noto Sans Mono" \
            -V logo="IEHI_logo_transparente_recortado.png" \
            -V version="${{ steps.version.outputs.current_version }}" \
            -V estado="${{ steps.version.outputs.estado }}" \
            -V horizonte="${{ steps.version.outputs.horizonte }}" \
            -V idioma="${{ steps.version.outputs.idioma }}" \
            -V naturaleza="${{ steps.version.outputs.naturaleza }}" \
            -V fecha="${{ steps.version.outputs.fecha }}" \
            -o "${{ steps.version.outputs.pdf_file }}"

      - name: Update current version manifest
        shell: python
        run: |
          import json
          import os
          from datetime import datetime, timezone

          generated_at = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          manifest = {
            "current_version": "${{ steps.version.outputs.current_version }}",
            "markdown_file": "${{ steps.version.outputs.markdown_file }}",
            "pdf_file": "${{ steps.version.outputs.pdf_file }}",
            "updated_at": generated_at.split("T")[0],
            "generated_at": generated_at
          }

          with open("iehi-current-version.json", "w", encoding="utf-8") as file:
            json.dump(manifest, file, ensure_ascii=False, indent=2)
            file.write("\n")

      - name: Create pull request with generated PDF and manifest
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          branch: auto/build-codigo-semilla-pdf
          delete-branch: true
          add-paths: |
            ${{ steps.version.outputs.pdf_file }}
            iehi-current-version.json
          commit-message: Build Codigo Semilla PDF for ${{ steps.version.outputs.current_version }}
          title: Build Codigo Semilla PDF for ${{ steps.version.outputs.current_version }}
          body: |
            Este PR fue generado automáticamente para actualizar el PDF del Código Semilla y el manifiesto de versión actual.
